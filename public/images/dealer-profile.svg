<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 560" role="img" aria-label="딜러 프로필">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10243a"/>
      <stop offset="0.55" stop-color="#0c3650"/>
      <stop offset="1" stop-color="#061019"/>
    </linearGradient>
    <radialGradient id="pglow" cx="0.5" cy="0.34" r="0.55">
      <stop offset="0" stop-color="#0aa6d0" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#0aa6d0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="suit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2c3a"/>
      <stop offset="1" stop-color="#0e1722"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7c6a8"/>
      <stop offset="1" stop-color="#cda482"/>
    </linearGradient>
  </defs>

  <rect width="480" height="560" fill="url(#pbg)"/>
  <rect width="480" height="560" fill="url(#pglow)"/>

  <!-- shoulders / suit -->
  <path d="M88 560 C96 452 150 408 240 408 C330 408 384 452 392 560 Z" fill="url(#suit)"/>
  <!-- shirt + tie -->
  <path d="M210 414 L240 470 L270 414 L262 408 L240 430 L218 408 Z" fill="#e8eef4"/>
  <path d="M236 432 L244 432 L250 500 L240 520 L230 500 Z" fill="#0aa6d0"/>
  <!-- lapels -->
  <path d="M210 414 L240 470 L214 470 L196 440 Z" fill="#162230"/>
  <path d="M270 414 L240 470 L266 470 L284 440 Z" fill="#162230"/>
  <!-- neck -->
  <rect x="222" y="372" width="36" height="48" rx="14" fill="url(#skin)"/>
  <!-- head -->
  <ellipse cx="240" cy="318" rx="74" ry="84" fill="url(#skin)"/>
  <!-- hair -->
  <path d="M168 308 C168 246 198 214 240 214 C282 214 312 246 312 308 C312 286 300 258 240 258 C182 258 170 288 168 308 Z" fill="#1b232d"/>
  <path d="M166 312 C160 270 196 232 240 232 C246 232 246 256 240 256 C200 256 176 282 178 320 Z" fill="#222b36"/>
  <!-- subtle smile -->
  <path d="M218 350 C228 360 252 360 262 350" fill="none" stroke="#a9805f" stroke-width="3" stroke-linecap="round"/>
  <!-- ring light -->
  <circle cx="240" cy="318" r="118" fill="none" stroke="#0aa6d0" stroke-width="2" opacity="0.25"/>
</svg>
